<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Shop</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
}

header{
  background:#3e2723;
  color:white;
  padding:20px;
  text-align:center;
}

nav{
  background:#5d4037;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
}

nav a{
  color:white;
  padding:15px 20px;
  text-decoration:none;
}

nav a:hover{
  background:#8d6e63;
}

.hero{
  text-align:center;
  padding:60px 20px;
  background:url('https://images.unsplash.com/photo-1509042239860-f550ce710b93') center/cover;
  color:white;
}

.section{
  padding:40px 20px;
  text-align:center;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  border-radius:10px;
}

button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  background:#6d4c41;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#4e342e;
}

footer{
  background:#3e2723;
  color:white;
  text-align:center;
  padding:15px;
  margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>☕ Coffee Shop</h1>
</header>

<nav>
<a href="index.html">หน้าแรก</a>
<a href="menu.html">เมนูกาแฟ</a>
<a href="bakery.html">เบเกอรี่</a>
</nav>

<section class="hero">
<h2>ยินดีต้อนรับสู่ร้านกาแฟของเรา</h2>
<p>กาแฟสดใหม่ทุกวัน ☕</p>
</section>

<section class="section">
<h2>เมนูขายดี</h2>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085">
<h3>Latte</h3>
<p>ราคา 60 บาท</p>
<button>สั่งซื้อ</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb">
<h3>Cappuccino</h3>
<p>ราคา 65 บาท</p>
<button>สั่งซื้อ</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1551024601-bec78aea704b">
<h3>Croissant</h3>
<p>ราคา 45 บาท</p>
<button>สั่งซื้อ</button>
</div>

</div>
</section>

<footer>
© 2026 Coffee Shop | พัฒนาโดย jaguar 🚀
</footer>

</body>
</html>
