<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Coffee</title>
<style>
body{margin:0;font-family:Arial;background:#f3f3f3;}
header{background:#4e342e;color:white;padding:20px;text-align:center;}
.container{padding:30px;}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:white;padding:20px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);text-align:center;}
.card img{width:100%;height:200px;object-fit:cover;border-radius:10px;}
button{padding:6px 12px;margin:5px;border:none;border-radius:5px;cursor:pointer;}
.checkout{background:green;color:white;}
.remove{background:red;color:white;}
.cart,.history{margin-top:30px;background:white;padding:20px;border-radius:10px;}
a{color:white;text-decoration:none;}
</style>
</head>

<body>

<header>
<h1>☕ เมนูกาแฟ</h1>
<a href="index.html">← กลับหน้าแรก</a>
</header>

<div class="container">

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?w=800">
<h3>Espresso</h3>
<p>50 บาท</p>
<button onclick="addToCart('Espresso',50)">เพิ่ม</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1521305916504-4a1121188589?w=800">
<h3>Latte</h3>
<p>60 บาท</p>
<button onclick="addToCart('Latte',60)">เพิ่ม</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1509785307050-d4066910ec1e?w=800">
<h3>Cappuccino</h3>
<p>65 บาท</p>
<button onclick="addToCart('Cappuccino',65)">เพิ่ม</button>
</div>

</div>

<div class="cart">
<h2>🛒 ตะกร้า</h2>
<div id="cartItems"></div>
<p>ยอดรวม: <span id="total">0</span> บาท</p>
<button class="checkout" onclick="checkout()">สั่งซื้อ</button>
</div>

<div class="history">
<h2>📜 ประวัติการสั่งซื้อ</h2>
<div id="history"></div>
<button class="remove" onclick="clearHistory()">ลบประวัติ</button>
</div>

</div>
