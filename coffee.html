<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Jaguar Coffee</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f3f3;
}

header{
background:#4e342e;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:30px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

button{
padding:8px 14px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.add{
background:#6d4c41;
color:white;
}

.checkout{
background:green;
color:white;
}

.remove{
background:red;
color:white;
}

.cancel{
background:orange;
color:white;
}

.cart,.form,.receipt{
margin-top:30px;
background:white;
padding:20px;
border-radius:10px;
}

input{
padding:8px;
margin:5px;
width:200px;
}

.logo{
font-size:22px;
font-weight:bold;
}

a{
color:white;
text-decoration:none;
}

.receipt-box{
border:1px dashed #999;
padding:15px;
margin-top:10px;
background:#fafafa;
}

.print{
background:#2196f3;
color:white;
}

</style>
</head>

<body>

<header>
<div class="logo">☕ Jaguar Coffee</div>
<a href="index.html">← กลับหน้าแรก</a>
</header>

<div class="container">

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
<h3>Espresso</h3>
<p>50 บาท</p>
<button class="add" onclick="addToCart('Espresso',50)">เพิ่ม</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735">
<h3>Latte</h3>
<p>60 บาท</p>
<button class="add" onclick="addToCart('Latte',60)">เพิ่ม</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
<h3>Cappuccino</h3>
<p>65 บาท</p>
<button class="add" onclick="addToCart('Cappuccino',65)">เพิ่ม</button>
</div>

</div>

<div class="cart">

<h2>🛒 ตะกร้าสินค้า</h2>

<div id="cartItems"></div>

<p>ยอดรวม: <span id="total">0</span> บาท</p>

<button class="cancel" onclick="cancelCart()">ยกเลิกสินค้า</button>

</div>

<div class="form">

<h2>📝 ข้อมูลผู้สั่งซื้อ</h2>

<input id="name" placeholder="ชื่อผู้ซื้อ"><br>
<input id="phone" placeholder="เบอร์โทร"><br>
<input id="money" placeholder="เงินที่จ่าย"><br>

<button class="checkout" onclick="checkout()">สั่งซื้อ</button>

</div>

<div class="receipt">

<h2>🧾 ใบเสร็จ</h2>

<div id="receipt" class="receipt-box"></div>

<button class="print" onclick="printReceipt()">พิมพ์ใบเสร็จ</button>

</div>

</div>

<script>

let cart=[]
let total=0
let orderNumber=1

function addToCart(name,price){

let item=cart.find(i=>i.name===name)

if(item){
item.qty++
}else{
cart.push({name:name,price:price,qty:1})
}

total+=price

renderCart()

}

function renderCart(){

let div=document.getElementById("cartItems")

div.innerHTML=""

cart.forEach((item,index)=>{

div.innerHTML+=`
${item.name} x${item.qty} = ${item.price*item.qty} บาท
<button class="remove" onclick="removeItem(${index})">ลบ</button>
<br>
`

})

document.getElementById("total").innerText=total

}

function removeItem(index){

total-=cart[index].price*cart[index].qty

cart.splice(index,1)

renderCart()

}

function cancelCart(){

cart=[]
total=0

renderCart()

}

function checkout(){

if(cart.length==0){
alert("ไม่มีสินค้า")
return
}

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let money=parseInt(document.getElementById("money").value)

if(!name || !phone || !money){
alert("กรอกข้อมูลให้ครบ")
return
}

if(money<total){
alert("เงินไม่พอ")
return
}

let change=money-total

let now=new Date().toLocaleString()

let receiptHTML=""

receiptHTML+="<b>☕ Jaguar Coffee</b><br>"
receiptHTML+="Order #: "+orderNumber+"<br>"
receiptHTML+="วันที่: "+now+"<br><br>"

receiptHTML+="ลูกค้า: "+name+"<br>"
receiptHTML+="เบอร์: "+phone+"<br><br>"

receiptHTML+="รายการสินค้า<br>"

cart.forEach(item=>{
receiptHTML+=item.name+" x"+item.qty+" = "+(item.price*item.qty)+" บาท<br>"
})

receiptHTML+="<br>"
receiptHTML+="ยอดรวม: "+total+" บาท<br>"
receiptHTML+="รับเงิน: "+money+" บาท<br>"
receiptHTML+="เงินทอน: "+change+" บาท<br>"

document.getElementById("receipt").innerHTML=receiptHTML

orderNumber++

cart=[]
total=0

renderCart()

}

function printReceipt(){

let content=document.getElementById("receipt").innerHTML

let win=window.open("")

win.document.write(content)

win.print()

}

</script>

</body>
</html>
