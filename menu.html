<!DOCTYPE html>
<html lang="th">
<head>

<title>Menu</title>

<style>
body{

}

header{
background:#4e342e;
color:white;
padding:20px;

}

.container{
padding:30px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.price{
font-weight:bold;
}

a{
color:white;
text-decoration:none;
}

h2{
margin-top:40px;
}
</style>

</head>
<body>

<header>

</div>

<div class="card">

</div>

</html>
